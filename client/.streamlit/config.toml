[theme]
primaryColor = "#F59E0B"
backgroundColor = "#0A0B0F"
secondaryBackgroundColor = "#111218"
textColor = "#F1F5F9"
font = "sans serif"

[server]
maxUploadSize = 10
enableXsrfProtection = false
enableCORS = false
headless = true

[browser]
gatherUsageStats = false

[client]
showSidebarNavigation = true
toolbarMode = "minimal"